# databricks.yml — Asset Bundle root config.
# Spiritual successor to dvc.yaml + docker-compose.yml: the whole target
# environment (job, schedule, compute) is reproducible from source control.
bundle:
  name: churn_prediction_pipeline

include:
  - resources/*.yml

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: <WORKSPACE_URL>
  prod:
    mode: production
    workspace:
      host: <WORKSPACE_URL>
      root_path: /Shared/.bundle/churn_prediction_pipeline/${bundle.target}
